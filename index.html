<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cloud Hoist Control</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    /* Make buttons look 3D and "press" down when clicked/touched */
.btn {
  transition: all 0.1s ease;
  box-shadow: 0px 6px 0px #333; /* The 3D edge */
  position: relative;
}

.btn:active {
  box-shadow: 0px 2px 0px #333; /* Flattens when pressed */
  top: 4px; /* Physically moves the button down */
  transform: scale(0.98);
}

/* Hover effects to show it's clickable */
.btn-up:hover { background-color: #45a049; }
.btn-down:hover { background-color: #da190b; }

/* The Live Status Badge */
#status-badge {
  font-size: 1.2rem;
  font-weight: bold;
  padding: 10px 20px;
  border-radius: 5px;
  background-color: #555;
  color: white;
  margin: 20px auto;
  width: fit-content;
  transition: background-color 0.3s ease;
}
    body { font-family: Arial; text-align: center; margin-top: 50px; user-select: none; }
    .button { display: inline-block; padding: 30px 40px; font-size: 30px; cursor: pointer; border-radius: 10px; color: white; border: none; margin: 20px; width: 250px; }
    .btn-up { background-color: #4CAF50; }
    .btn-down { background-color: #2196F3; }
    .btn-up:active, .btn-down:active { opacity: 0.7; }
  </style>
</head>
<body>
  <h1>Cloud Hoist</h1>
  <!-- Passing 1 for UP, 0 for STOP -->
  <button class="button btn-up" 
    onmousedown="sendCommand(1)" onmouseup="sendCommand(0)" onmouseleave="sendCommand(0)"
    ontouchstart="sendCommand(1)" ontouchend="sendCommand(0)">UP</button>
  <br>
  <!-- Passing 2 for DOWN, 0 for STOP -->
  <button class="button btn-down" 
    onmousedown="sendCommand(2)" onmouseup="sendCommand(0)" onmouseleave="sendCommand(0)"
    ontouchstart="sendCommand(2)" ontouchend="sendCommand(0)">DOWN</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC4rm0V4SGMexR-G5jR_Tw_mia9iFGDviA",
      databaseURL: "https://remote-lift-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "remote-lift" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function sendCommand(actionVal) {
      if(event && event.type == 'touchstart') { event.preventDefault(); }
      
      // Write the integer to the /lift node
      database.ref('/lift').set(actionVal)
        .then(() => console.log("Sent state: " + actionVal))
        .catch((error) => console.error("Error writing to Firebase: ", error));
    }
  </script>
</body>
</html>
